<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>deadline.js tests</title></head>
<body>
<pre id="output"></pre>
<script src="../js/data.js"></script>
<script src="../js/deadline.js"></script>
<script>
const out = document.getElementById('output')
let passed = 0, failed = 0
function assert(label, condition) {
  out.textContent += (condition ? `✓ ${label}\n` : `✗ FAIL: ${label}\n`)
  condition ? passed++ : failed++
}

// relativeLabel tests — freeze "today" to 2026-05-10 (Sunday)
const today = new Date('2026-05-10')

assert('today label', relativeLabel('2026-05-10', today) === '今天')
assert('tomorrow label', relativeLabel('2026-05-11', today) === '明天')
// 2026-05-13 is Wednesday — still within current week (Mon-Sun)
assert('this week label starts with 本周', relativeLabel('2026-05-13', today).startsWith('本周'))
// 2026-05-18 is Monday — next week
assert('next week label starts with 下周', relativeLabel('2026-05-18', today).startsWith('下周'))
// 2026-06-10 is far away — should show MM-DD
assert('far label shows date', relativeLabel('2026-06-10', today).includes('06-10'))

// urgencyClass tests
assert('today is critical', urgencyClass('2026-05-10', today) === 'urgency-critical')
assert('tomorrow is critical', urgencyClass('2026-05-11', today) === 'urgency-critical')
assert('this week is urgency-week', urgencyClass('2026-05-15', today) === 'urgency-week')
assert('next week is urgency-next', urgencyClass('2026-05-20', today) === 'urgency-next')
assert('far is urgency-far', urgencyClass('2026-07-01', today) === 'urgency-far')

// collectDeadlineItems — collects nodes with deadline at any depth from main/side/fun
const data = emptyData()
const proj = makeItem('Project A')           // no deadline
const phase = { ...makeItem('Phase 1'), deadline: '2026-05-15' }
const task  = { ...makeItem('Subtask'),  deadline: '2026-05-20' }
const projWithChildren = { ...proj, children: [{ ...phase, children: [task] }] }
data.quadrants.main.items = [projWithChildren]

const collected = collectDeadlineItems(data)
assert('collects phase with deadline', collected.some(x => x.title === 'Phase 1'))
assert('collects subtask with deadline', collected.some(x => x.title === 'Subtask'))
assert('does not collect node without deadline', !collected.some(x => x.title === 'Project A'))

// standalone items included
data.quadrants.deadline.standalone = [{ ...makeItem('Pay bill'), deadline: '2026-05-12' }]
const collected2 = collectDeadlineItems(data)
assert('includes standalone items', collected2.some(x => x.title === 'Pay bill'))

// results are sorted by deadline ascending
const dates = collected2.map(x => x.deadline)
const sorted = [...dates].sort()
assert('results sorted by deadline', JSON.stringify(dates) === JSON.stringify(sorted))

out.textContent += `\n${passed} passed, ${failed} failed`
</script>
</body>
</html>
