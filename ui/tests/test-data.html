<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>data.js tests</title></head>
<body>
<pre id="output"></pre>
<script src="../js/data.js"></script>
<script>
const out = document.getElementById('output')
let passed = 0, failed = 0

function assert(label, condition) {
  if (condition) {
    out.textContent += `✓ ${label}\n`
    passed++
  } else {
    out.textContent += `✗ FAIL: ${label}\n`
    failed++
  }
}

// makeId returns unique strings
const id1 = makeId(), id2 = makeId()
assert('makeId returns string', typeof id1 === 'string')
assert('makeId returns unique values', id1 !== id2)

// makeItem default shape
const item = makeItem('Test project')
assert('makeItem has id', typeof item.id === 'string')
assert('makeItem has title', item.title === 'Test project')
assert('makeItem status defaults to todo', item.status === 'todo')
assert('makeItem deadline defaults to null', item.deadline === null)
assert('makeItem logs is array', Array.isArray(item.logs))
assert('makeItem children is array', Array.isArray(item.children))

// addLog
const logged = addLog(item, 'Did some work')
assert('addLog adds entry', logged.logs.length === 1)
assert('addLog has text', logged.logs[0].text === 'Did some work')
assert('addLog has time string', typeof logged.logs[0].time === 'string')
assert('addLog does not mutate original', item.logs.length === 0)

// setStatus
const activated = setStatus(item, 'active')
assert('setStatus returns new item', activated !== item)
assert('setStatus updates status', activated.status === 'active')
assert('setStatus does not mutate original', item.status === 'todo')

// emptyData
const data = emptyData()
assert('emptyData has lastOpenDate null', data.lastOpenDate === null)
assert('emptyData has main quadrant', Array.isArray(data.quadrants.main.items))
assert('emptyData has deadline standalone', Array.isArray(data.quadrants.deadline.standalone))

// getData / setData
const original = getData()
const newData = emptyData()
newData.lastOpenDate = '2026-05-10'
setData(newData)
assert('setData updates global state', getData().lastOpenDate === '2026-05-10')
setData(original) // restore

// onAHKMessage — load type sets _data and calls onDataReady
let readyCalled = false
window.onDataReady = () => { readyCalled = true }
const testData = emptyData()
testData.lastOpenDate = 'test-date'
onAHKMessage({ type: 'load', data: testData })
assert('onAHKMessage sets _data', getData().lastOpenDate === 'test-date')
assert('onAHKMessage calls onDataReady', readyCalled === true)
window.onDataReady = undefined // cleanup

// emptyData — side, fun quadrants and name fields
const d2 = emptyData()
assert('emptyData side has items array', Array.isArray(d2.quadrants.side.items))
assert('emptyData fun has items array', Array.isArray(d2.quadrants.fun.items))
assert('emptyData main has name', typeof d2.quadrants.main.name === 'string')
assert('emptyData deadline has name', typeof d2.quadrants.deadline.name === 'string')

out.textContent += `\n${passed} passed, ${failed} failed`
</script>
</body>
</html>
