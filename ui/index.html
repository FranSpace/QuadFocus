<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuadFocus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Custom title bar -->
  <div id="titlebar">
    <div id="tb-logo-area">
      <img src="../logo_light.png" width="22" height="22" alt="QuadFocus" style="border-radius:5px;flex-shrink:0">
      <span id="tb-app-name">QuadFocus</span>
    </div>
    <div class="tb-sep"></div>
    <div id="tb-search-wrap" class="no-drag">
      <span id="tb-search-icon">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </span>
      <input id="tb-search-input" placeholder="搜索任务、项目..." autocomplete="off" spellcheck="false">
      <kbd id="tb-search-kbd">Ctrl K</kbd>
    </div>
    <div id="tb-center">
      <span id="tb-date"></span>
    </div>
    <div id="tb-actions" class="no-drag">
      <button class="tb-btn" id="tb-btn-today">Today</button>
      <button class="tb-btn" id="tb-btn-archive" onclick="toggleArchive()">归档 <span id="archive-count">0</span></button>
      <button class="tb-btn tb-btn-primary" id="tb-btn-new">+ 新建 <kbd class="tb-kbd">N</kbd></button>
    </div>
    <div id="tb-win-controls" class="no-drag">
      <button class="tb-win-btn" id="tb-minimize" title="最小化">
        <svg width="10" height="1" viewBox="0 0 10 1"><rect width="10" height="1" fill="currentColor"/></svg>
      </button>
      <button class="tb-win-btn" id="tb-maximize" title="最大化 / 还原">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><rect x="0.5" y="0.5" width="9" height="9" stroke="currentColor" stroke-width="1"/></svg>
      </button>
      <button class="tb-win-btn tb-win-close" id="tb-close" title="关闭">
        <svg width="10" height="10" viewBox="0 0 10 10"><line x1="0.5" y1="0.5" x2="9.5" y2="9.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><line x1="9.5" y1="0.5" x2="0.5" y2="9.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>

  <!-- Search results overlay -->
  <div id="search-results" class="hidden"></div>

  <div id="app">
    <div class="quadrant" id="q-main">
      <div class="quadrant-header">
        <div class="quadrant-header-left">
          <span class="quadrant-icon" id="icon-main"></span>
          <div class="quadrant-title-block">
            <span class="quadrant-title-zh">主线工作</span>
            <span class="quadrant-title-en">Main Track</span>
          </div>
        </div>
        <div class="quadrant-stats" id="stats-main">—</div>
      </div>
      <div class="items" id="items-main"></div>
    </div>
    <div class="quadrant" id="q-side">
      <div class="quadrant-header">
        <div class="quadrant-header-left">
          <span class="quadrant-icon" id="icon-side"></span>
          <div class="quadrant-title-block">
            <span class="quadrant-title-zh">支线项目</span>
            <span class="quadrant-title-en">Side Projects</span>
          </div>
        </div>
        <div class="quadrant-stats" id="stats-side">—</div>
      </div>
      <div class="items" id="items-side"></div>
    </div>
    <div class="divider divider-v" id="divider-v"></div>
    <div class="divider divider-h" id="divider-h"></div>
    <div class="quadrant" id="q-fun">
      <div class="quadrant-header">
        <div class="quadrant-header-left">
          <span class="quadrant-icon" id="icon-fun"></span>
          <div class="quadrant-title-block">
            <span class="quadrant-title-zh">有意思的项目</span>
            <span class="quadrant-title-en">Fun &amp; Curiosity</span>
          </div>
        </div>
        <div class="quadrant-stats" id="stats-fun">—</div>
      </div>
      <div class="items" id="items-fun"></div>
    </div>
    <div class="quadrant" id="q-deadline">
      <div class="quadrant-header">
        <div class="quadrant-header-left">
          <span class="quadrant-icon" id="icon-ddl"></span>
          <div class="quadrant-title-block">
            <span class="quadrant-title-zh">截止期限</span>
            <span class="quadrant-title-en">Deadline</span>
          </div>
        </div>
        <div class="quadrant-stats" id="stats-deadline">—</div>
      </div>
      <div class="items" id="items-deadline"></div>
    </div>
  </div>
  <!-- Floating input dialog -->
  <div id="float-dialog" class="float-dialog hidden"></div>

  <!-- Archive panel -->
  <div id="archive-panel" class="archive-panel hidden">
    <div class="archive-header">
      <h3>归档记录</h3>
      <button class="archive-close" onclick="toggleArchive()">×</button>
    </div>
    <div id="archive-list"></div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/deadline.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
