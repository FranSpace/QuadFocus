<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>QuadFocus — 初始设置</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="onboarding-body">
  <h1>欢迎使用 QuadFocus</h1>
  <div id="step-1" class="step">
    <h2>Step 1 / 3：数据存放位置</h2>
    <p>建议放在 OneDrive 文件夹以实现多设备同步</p>
    <input type="text" id="data-path" placeholder="C:\Users\...\OneDrive\QuadFocus\data.json">
    <button onclick="browseDataPath()">浏览...</button>
    <button onclick="goStep2()">下一步</button>
  </div>
  <div id="step-2" class="step" style="display:none">
    <h2>Step 2 / 3：快捷键</h2>
    <input type="text" id="hotkey" value="Ctrl+Alt+Space" readonly>
    <p>点击输入框后按下你想要的组合键</p>
    <button onclick="goStep3()">下一步</button>
  </div>
  <div id="step-3" class="step" style="display:none">
    <h2>Step 3 / 3：开机自启</h2>
    <label><input type="checkbox" id="auto-start" checked> 开机自动启动 QuadFocus</label>
    <button onclick="finishSetup()">完成</button>
  </div>
  <script src="js/onboarding.js"></script>
</body>
</html>
